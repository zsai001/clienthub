name: Release

on:
  push:
    branches: [dev]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: freebsd
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "version=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}"

          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          DIST_DIR="dist/clienthub-${GOOS}-${GOARCH}"
          mkdir -p "$DIST_DIR"

          go build -ldflags "$LDFLAGS" -o "${DIST_DIR}/hub-server${EXT}" ./cmd/server
          go build -ldflags "$LDFLAGS" -o "${DIST_DIR}/hub-client${EXT}" ./cmd/client
          go build -ldflags "$LDFLAGS" -o "${DIST_DIR}/hubctl${EXT}"     ./cmd/manager

          cp -r examples "${DIST_DIR}/examples"

      - name: Package (tar.gz)
        if: matrix.goos != 'windows'
        run: |
          cd dist
          tar czf "clienthub-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            "clienthub-${{ matrix.goos }}-${{ matrix.goarch }}/"

      - name: Package (zip)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          zip -r "clienthub-${{ matrix.goos }}-${{ matrix.goarch }}.zip" \
            "clienthub-${{ matrix.goos }}-${{ matrix.goarch }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clienthub-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/clienthub-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release-dev:
    needs: build
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Delete existing dev-latest release
        run: gh release delete dev-latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev pre-release
        run: |
          gh release create dev-latest \
            --title "Dev Build ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes "$(cat <<'NOTES'
          **Development build** — automatically generated from the \`dev\` branch.

          > This is a pre-release for testing. For stable versions use the \`stable\` channel.

          **Install / Update:**
          ```bash
          # Linux / macOS
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/dev/install.sh | bash -s -- --channel dev

          # Windows (PowerShell)
          irm https://raw.githubusercontent.com/${{ github.repository }}/dev/install.ps1 | iex
          ```
          NOTES
          )" \
            --prerelease \
            --target dev \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-stable:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create stable release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "ClientHub $TAG" \
            --generate-notes \
            --latest \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
